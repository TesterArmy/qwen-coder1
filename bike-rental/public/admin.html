<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - BikeRental</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
    <!-- Navigation -->
    <nav class="navbar admin-navbar">
        <div class="container">
            <div class="logo">
                <h1>🚴 BikeRental Admin</h1>
            </div>
            <ul class="nav-links">
                <li><a href="/">Back to Website</a></li>
            </ul>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="admin-container">
        <div class="admin-header">
            <h2>Booking Management Dashboard</h2>
            <div class="stats-overview">
                <div class="stat-card">
                    <h3>Total Bookings</h3>
                    <p id="total-bookings">0</p>
                </div>
                <div class="stat-card">
                    <h3>Active Bookings</h3>
                    <p id="active-bookings">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Revenue</h3>
                    <p id="total-revenue">$0.00</p>
                </div>
                <div class="stat-card">
                    <h3>Available Bikes</h3>
                    <p id="available-bikes">0</p>
                </div>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="admin-section">
            <div class="section-header">
                <h3>All Bookings</h3>
                <div class="filter-controls">
                    <select id="status-filter">
                        <option value="all">All Status</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>
            
            <div class="table-container">
                <table id="bookings-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Bike</th>
                            <th>Customer</th>
                            <th>Email</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Hours</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-tbody">
                        <!-- Bookings will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Bikes Inventory -->
        <div class="admin-section">
            <h3>Bike Inventory</h3>
            <div class="table-container">
                <table id="bikes-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Price/Hour</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="bikes-tbody">
                        <!-- Bikes will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
